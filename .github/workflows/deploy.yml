name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Check TypeScript Compilation
        run: npx tsc

      - name: Lint Code
        run: npm run lint

  deploy:
    needs: test-and-lint
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || 22 }}
          script: |
            # Ensure the deployment script fails on error
            set -e
            
            # 1. Navigate to the project directory on VPS
            cd "${{ secrets.VPS_PROJECT_PATH }}"
            
            # 2. Pull the latest code safely
            git pull origin main
            
            # 3. Rebuild ONLY the production container image
            docker compose build app-prod
            
            # 4. Re-create and restart ONLY the app-prod service, leaving all other VPS containers untouched
            docker compose up -d --no-deps app-prod
            
            # 5. Clean up dangling build images (safely removes unused image cache without affecting active services)
            docker image prune -f
