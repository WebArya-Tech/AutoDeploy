name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build CI Docker Image
        run: |
          docker build \
            --target ci \
            --tag autodeploy-ci:latest \
            --file Dockerfile.ci \
            .

      - name: Run TypeScript Check inside Docker
        run: |
          docker run --rm autodeploy-ci:latest npx tsc --noEmit

      - name: Run Lint inside Docker
        run: |
          docker run --rm autodeploy-ci:latest npm run lint

  deploy:
    needs: test-and-lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check VPS Port Reachability
        run: |
          PORT=${{ secrets.VPS_SSH_PORT || 22 }}
          HOST=${{ secrets.VPS_HOST }}
          echo "Testing TCP connectivity to $HOST:$PORT ..."
          nc -zv -w 10 "$HOST" "$PORT" && echo "✅ Port is reachable" || echo "❌ Port is NOT reachable — check VPS firewall"

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || 22 }}
          command_timeout: 5m
          debug: true
          script: |
            # Ensure the deployment script fails on error
            set -e

            # 1. Navigate to the project directory on VPS
            cd "${{ secrets.VPS_PROJECT_PATH }}"

            # 2. Pull the latest code safely
            git pull origin main

            # 3. Rebuild ONLY the production container image
            docker compose build app-prod

            # 4. Re-create and restart ONLY the app-prod service, leaving all other VPS containers untouched
            docker compose up -d --no-deps app-prod

            # 5. Clean up dangling build images (safely removes unused image cache without affecting active services)
            docker image prune -f
